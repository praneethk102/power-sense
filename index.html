<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PowerSense India</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div>
        <h1>PowerSense India</h1>
        <p>Energy Analytics Dashboard</p>
      </div>

      <button id="themeToggle">🌙</button>
    </header>

    <!-- CONTROLS -->
    <div class="controls">
      <select id="timeframe">
        <option value="7">7 Days</option>
        <option value="30">30 Days</option>
        <option value="365">1 Year</option>
      </select>
    </div>

    <!-- GRID -->
    <div class="grid">

      <div class="card highlight">
        <p id="lastUpdated"></p>
        <h2 id="summary"></h2>
      </div>

      <div class="card">
        <h3>Energy Mix</h3>
        <canvas id="energyChart"></canvas>
      </div>

      <div class="card wide">
        <h3>Trend (MU)</h3>
        <canvas id="trendChart"></canvas>
      </div>

      <div class="card">
        <h3>Yearly (BU)</h3>
        <canvas id="yearChart"></canvas>
        <p id="yearSummary"></p>
      </div>

      <div class="card">
        <h3>Insights</h3>
        <p id="insight"></p>
        <p id="comparison"></p>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
